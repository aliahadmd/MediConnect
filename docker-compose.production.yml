services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://mediconnect:mediconnect@postgres:5432/mediconnect
      LIVEKIT_URL: wss://livekit.aliahad.com
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: aVeryLongSecretKeyThatIsAtLeast32Characters
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      BETTER_AUTH_SECRET: k9X2mPqR7vLwJ4nT8bYcA3fGhD6sE1uZ
      BETTER_AUTH_URL: https://mediconnect.aliahad.com
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      minio:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.mediconnect.rule=Host(`mediconnect.aliahad.com`)
      - traefik.http.routers.mediconnect.entrypoints=websecure
      - traefik.http.routers.mediconnect.tls.certresolver=letsencrypt
      - traefik.http.services.mediconnect.loadbalancer.server.port=3000
    networks:
      - internal
      - traefik-public
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://mediconnect:mediconnect@postgres:5432/mediconnect
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediconnect
      POSTGRES_PASSWORD: mediconnect
      POSTGRES_DB: mediconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediconnect -d mediconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /tmp/livekit.yaml <<EOF
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          devkey: aVeryLongSecretKeyThatIsAtLeast32Characters
        EOF
        exec livekit-server --config /tmp/livekit.yaml --node-ip 72.62.162.106
    labels:
      - traefik.enable=true
      - traefik.http.routers.livekit.rule=Host(`livekit.aliahad.com`)
      - traefik.http.routers.livekit.entrypoints=websecure
      - traefik.http.routers.livekit.tls.certresolver=letsencrypt
      - traefik.http.services.livekit.loadbalancer.server.port=7880
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - internal
      - traefik-public
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - internal
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
