services:
  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: postgresql://mediconnect:${POSTGRES_PASSWORD}@postgres:5432/mediconnect
      LIVEKIT_URL: wss://${LIVEKIT_DOMAIN}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://${APP_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      livekit:
        condition: service_started
      minio:
        condition: service_started
    labels:
      - traefik.enable=true
      - traefik.http.routers.mediconnect.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.mediconnect.entrypoints=websecure
      - traefik.http.routers.mediconnect.tls.certresolver=letsencrypt
      - traefik.http.services.mediconnect.loadbalancer.server.port=3000
    networks:
      - internal
      - traefik-public
    restart: unless-stopped

  # Database migration (runs once then exits)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: postgresql://mediconnect:${POSTGRES_PASSWORD}@postgres:5432/mediconnect
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediconnect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mediconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediconnect -d mediconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    restart: unless-stopped

  # LiveKit WebRTC server
  livekit:
    image: livekit/livekit-server:latest
    entrypoint: /bin/sh
    command:
      - -c
      - |
        cat > /tmp/livekit.yaml <<EOF
        port: 7880
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        EOF
        exec livekit-server --config /tmp/livekit.yaml --node-ip ${SERVER_IP}
    labels:
      - traefik.enable=true
      - traefik.http.routers.livekit.rule=Host(`${LIVEKIT_DOMAIN}`)
      - traefik.http.routers.livekit.entrypoints=websecure
      - traefik.http.routers.livekit.tls.certresolver=letsencrypt
      - traefik.http.services.livekit.loadbalancer.server.port=7880
    ports:
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - internal
      - traefik-public
    restart: unless-stopped

  # MinIO S3-compatible storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - internal
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true
