services:
  # Next.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      LIVEKIT_URL: ${LIVEKIT_PUBLIC_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
      minio:
        condition: service_started
    networks:
      - mediconnect
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Database migration runner (runs once then exits)
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mediconnect
    restart: "no"

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediconnect
      POSTGRES_PASSWORD: mediconnect
      POSTGRES_DB: mediconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediconnect -d mediconnect"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mediconnect
    restart: unless-stopped

  # LiveKit WebRTC server (config baked into image)
  livekit:
    build:
      context: .
      dockerfile: Dockerfile.livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    networks:
      - mediconnect
    restart: unless-stopped

  # MinIO S3-compatible object storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - mediconnect
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:

networks:
  mediconnect:
    driver: bridge
  coolify:
    external: true
